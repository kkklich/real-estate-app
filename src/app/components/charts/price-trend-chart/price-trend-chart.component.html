<mat-card>
    <div class="card-title">Average price per m² over time</div>
    @if (timeline().length > 0) {
    <div class="chart-wrapper">
        <canvas baseChart type="bar" [data]="chartData()" [options]="chartOptions"></canvas>
    </div>
    } @else {
    <div class="chart-empty">No timeline data yet</div>
    }
</mat-card>
